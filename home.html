<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>

</head>
<body>
    <nav class="flex justify-between w-11/12 mx-auto shadow-md py-4">
        <div class="flex items-center gap-1">
            <img class="w-9" src="assets/github-logo.png" alt="">
            <h3 class="font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h3>
        </div>
        <div class="flex">
  <input id="searchInput" class="input" type="search" required placeholder="Search issues..."/>
<button onclick="searchIssue()" class="btn btn-primary"> + New Issue</button>
        </div>

    </nav>
    <section class="border border-[#FFFFFF] shadow-md mt-14 w-11/12  mx-auto">
        <div>
             <button onclick="loadIssues(this)"  class="btn btn-primary">All</button>
             <button onclick="openIssues(this)"  class="btn">Open</button>
             <button onclick="closedIssues(this)"  class="btn">Closed</button>
             </div>
        </div>
    </section>
    <section class="flex justify-between border border-[#FFFFFF] shadow-md mt-14 w-11/12  mx-auto">
        <div class="flex items-center gap-2 p-6 ">
            <img src="assets/Aperture.png" alt="">
            <div>
                <h2 class="font-semibold text-[20px] text-[#1F2937]">0 Issues</h2>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4 text-sm font-medium">
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-green-500"></span>
            <span class="text-gray-600">Open</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-purple-500"></span>
            <span class="text-gray-600">Closed</span>
        </div>
    </div>
    </section>
    <section class="w-11/12 mx-auto">
        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4"></div>
    </section>
   <!----- <button class="btn" onclick="my_modal_1.showModal()">open modal</button>--->
<dialog id="my_modal_1" class="modal">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Hello!</h3>
    <p class="py-4">Press ESC key or click the button below to close</p>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
    <script src="script.js"></script>
</body>
</html>
